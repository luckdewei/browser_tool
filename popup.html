<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" data-target="tab1">请求拦截 (Tab1)</button>
    <button class="tab-btn" data-target="tab2">Session同步 (Tab2)</button>
  </div>

  <!-- Tab 1: 请求拦截 -->
  <div id="tab1" class="tab-content active">
    <label>目标域名 (逗号分隔):</label>
    <input type="text" id="domains" placeholder="https://gw.test.bestpay.net">
    
    <label>替换的字段 (JSON格式):</label>
    <textarea id="replaceFields" placeholder='{"env": "DEV_XQYFGL191447"}'></textarea>
    
    <button id="saveConfig">保存拦截配置</button>
    <div id="status1" class="status"></div>
  </div>

  <!-- Tab 2: Session 复制 -->
  <div id="tab2" class="tab-content">
    <button id="copySession" class="btn-primary">复制当前页 SessionStorage</button>
    <button id="pasteSession" class="btn-danger">粘贴至当前页并覆盖</button>
    <div id="status2" class="status"></div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
